<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porcell DCF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --card:     #161922;
    --border:   #1f2433;
    --border2:  #2a3045;
    --accent:   #3b82f6;
    --accent2:  #1d4ed8;
    --green:    #22c55e;
    --red:      #ef4444;
    --amber:    #f59e0b;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --sub:      #94a3b8;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .tab-btn:hover { color: var(--text); background: var(--card); }
  .tab-btn.active { color: var(--accent); background: rgba(59,130,246,0.1); }

  /* ── MAIN LAYOUT ─────────────────────────────────────────────── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SEARCH BAR ──────────────────────────────────────────────── */
  .search-section {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 9px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  #ticker-input { width: 140px; text-transform: uppercase; }
  .narrow-input { width: 90px; }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--sub);
    padding-bottom: 10px;
  }

  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
    cursor: pointer;
  }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 22px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--sub);
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }

  /* ── STATUS BAR ──────────────────────────────────────────────── */
  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 6px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }

  .status-bar.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(59,130,246,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULTS GRID ────────────────────────────────────────────── */
  .results { display: none; animation: fadeIn 0.3s ease; }
  .results.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── TICKER HERO ─────────────────────────────────────────────── */
  .ticker-hero {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .ticker-name {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .ticker-price {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 300;
    color: var(--sub);
  }

  .ticker-cap {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  /* ── WARNING BANNERS ─────────────────────────────────────────── */
  .warning-banner {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-left: 3px solid var(--amber);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  /* ── GRID LAYOUTS ────────────────────────────────────────────── */
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* ── CARDS ───────────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ── SCENARIO CARDS ──────────────────────────────────────────── */
  .scenario-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .scenario-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .scenario-bear::before { background: var(--red); }
  .scenario-base::before { background: var(--accent); }
  .scenario-bull::before { background: var(--green); }

  .scenario-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .scenario-bear .scenario-label  { color: var(--red); }
  .scenario-base .scenario-label  { color: var(--accent); }
  .scenario-bull .scenario-label  { color: var(--green); }

  .scenario-fv {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .scenario-upside {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 16px;
  }

  .upside-pos { color: var(--green); }
  .upside-neg { color: var(--red); }

  .scenario-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
  }

  .detail-row .label { color: var(--muted); }
  .detail-row .val   { color: var(--sub); }

  /* ── METRICS GRID ────────────────────────────────────────────── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .metric-value {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .metric-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── FCF BAR CHART ───────────────────────────────────────────── */
  .fcf-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .fcf-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .fcf-bar-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 50px;
    flex-shrink: 0;
    text-align: right;
  }

  .fcf-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .fcf-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .fcf-bar-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--sub);
    width: 70px;
    flex-shrink: 0;
    text-align: right;
  }

  /* ── ML PANEL ────────────────────────────────────────────────── */
  .ml-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .ml-score-ring {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 10px;
  }

  .score-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    border: 3px solid;
  }

  .score-low  { color: var(--red);    border-color: var(--red);    background: rgba(239,68,68,0.08); }
  .score-mid  { color: var(--amber);  border-color: var(--amber);  background: rgba(245,158,11,0.08); }
  .score-high { color: var(--green);  border-color: var(--green);  background: rgba(34,197,94,0.08); }

  .stable-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
  }

  .badge-stable   { background: rgba(34,197,94,0.12);  color: var(--green); }
  .badge-unstable { background: rgba(239,68,68,0.12);  color: var(--red); }

  .cluster-pill {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .ml-warning {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    padding: 6px 10px;
    background: rgba(245,158,11,0.06);
    border-left: 2px solid var(--amber);
    border-radius: 0 4px 4px 0;
    margin-top: 6px;
  }

  /* ── CHART IMAGES ────────────────────────────────────────────── */
  .chart-img {
    width: 100%;
    border-radius: 4px;
    display: block;
  }

  /* ── PROJECTIONS TABLE ───────────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  th {
    text-align: right;
    padding: 8px 12px;
    color: var(--muted);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  th:first-child { text-align: left; }

  td {
    text-align: right;
    padding: 8px 12px;
    color: var(--sub);
    border-bottom: 1px solid var(--border);
  }

  td:first-child { text-align: left; color: var(--muted); }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── SENSITIVITY TABLE ───────────────────────────────────────── */
  .sensitivity-wrap { overflow-x: auto; }

  .sensitivity-table th, .sensitivity-table td {
    text-align: center;
    min-width: 60px;
    font-size: 11px;
  }

  .sensitivity-table td {
    font-weight: 500;
    border-radius: 2px;
  }

  .cell-pos-high  { color: #22c55e; background: rgba(34,197,94,0.15); }
  .cell-pos-mid   { color: #86efac; background: rgba(34,197,94,0.08); }
  .cell-pos-low   { color: #bbf7d0; background: rgba(34,197,94,0.04); }
  .cell-neutral   { color: var(--sub); }
  .cell-neg-low   { color: #fca5a5; background: rgba(239,68,68,0.04); }
  .cell-neg-mid   { color: #f87171; background: rgba(239,68,68,0.08); }
  .cell-neg-high  { color: #ef4444; background: rgba(239,68,68,0.15); }

  /* ── SCREENER TAB ────────────────────────────────────────────── */
  .screener-input {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  #tickers-textarea {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 6px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  #tickers-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  /* ── CANDIDATE CARDS ─────────────────────────────────────────── */
  .candidate-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
    cursor: default;
  }

  .candidate-card:hover { border-color: var(--border2); }

  .candidate-rank {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    width: 24px;
    text-align: center;
  }

  .candidate-ticker {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .candidate-reason {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .candidate-upsides {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .upside-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .upside-tag {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ── EMPTY / ERROR STATES ────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .empty-state .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-left: 3px solid var(--red);
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 16px;
  }

  /* ── SECTION HEADERS ─────────────────────────────────────────── */
  .section-header {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── IMPLIED GROWTH CALLOUT ──────────────────────────────────── */
  .implied-callout {
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 6px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 16px;
    color: var(--sub);
  }

  .implied-callout strong {
    color: var(--accent);
    font-size: 15px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    PORCELL DCF
  </div>
  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('analyze')">Analyze</button>
    <button class="tab-btn" onclick="switchTab('screen')">Screener</button>
  </nav>
</header>

<!-- MAIN -->
<div class="container">

  <!-- ── ANALYZE TAB ──────────────────────────────────────────── -->
  <div id="tab-analyze" class="tab-panel active">

    <div class="search-section">
      <div class="input-group">
        <span class="input-label">Ticker</span>
        <input type="text" id="ticker-input" placeholder="AAPL" maxlength="10"
               onkeydown="if(event.key==='Enter') runAnalysis()">
      </div>
      <div class="input-group">
        <span class="input-label">Base Growth</span>
        <input type="number" class="narrow-input" id="base-growth"
               placeholder="0.07" step="0.01" min="0" max="1">
      </div>
      <div class="input-group">
        <span class="input-label">WACC</span>
        <input type="number" class="narrow-input" id="base-wacc"
               placeholder="0.10" step="0.01" min="0.04" max="0.30">
      </div>
      <div class="input-group">
        <span class="input-label">Terminal g</span>
        <input type="number" class="narrow-input" id="base-terminal"
               placeholder="0.025" step="0.005" min="0" max="0.10">
      </div>
      <label class="toggle-label">
        <input type="checkbox" id="sensitivity-toggle"> Sensitivity
      </label>
      <button class="btn" id="analyze-btn" onclick="runAnalysis()">Run DCF</button>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="spinner"></div>
      <span id="status-text">Fetching data...</span>
    </div>

    <div id="error-container"></div>
    <div class="results" id="analyze-results"></div>

  </div>

  <!-- ── SCREENER TAB ─────────────────────────────────────────── -->
  <div id="tab-screen" class="tab-panel">

    <div class="screener-input">
      <span class="input-label">Tickers (one per line or comma-separated)</span>
      <textarea id="tickers-textarea"
        placeholder="AAPL&#10;MSFT&#10;GOOG&#10;AMZN&#10;META"></textarea>
      <div style="display:flex; gap:10px;">
        <button class="btn" onclick="runScreener()">Run Screener</button>
        <button class="btn btn-secondary" onclick="loadSavedCandidates()">Load Saved Candidates</button>
      </div>
    </div>

    <div class="status-bar" id="screen-status">
      <div class="spinner"></div>
      <span id="screen-status-text">Analyzing tickers...</span>
    </div>

    <div id="screen-results"></div>

  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
}

// ─────────────────────────────────────────────────────────────────────────────
// ANALYZE
// ─────────────────────────────────────────────────────────────────────────────
async function runAnalysis() {
  const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (!ticker) return;

  const btn = document.getElementById('analyze-btn');
  const status = document.getElementById('status-bar');
  const errorContainer = document.getElementById('error-container');
  const results = document.getElementById('analyze-results');

  btn.disabled = true;
  status.classList.add('visible');
  errorContainer.innerHTML = '';
  results.classList.remove('visible');
  document.getElementById('status-text').textContent = `Fetching ${ticker} from Yahoo Finance...`;

  const payload = {
    ticker,
    sensitivity: document.getElementById('sensitivity-toggle').checked,
    base_growth:   parseFloat(document.getElementById('base-growth').value) || null,
    base_wacc:     parseFloat(document.getElementById('base-wacc').value) || null,
    base_terminal: parseFloat(document.getElementById('base-terminal').value) || null,
  };

  try {
    document.getElementById('status-text').textContent = `Running DCF on ${ticker}...`;
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (!res.ok) {
      errorContainer.innerHTML = `<div class="error-msg">${data.error}</div>`;
    } else {
      results.innerHTML = buildAnalyzeHTML(data);
      results.classList.add('visible');
    }
  } catch (e) {
    errorContainer.innerHTML = `<div class="error-msg">Connection error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    status.classList.remove('visible');
  }
}

function buildAnalyzeHTML(d) {
  const s = d.scenarios;
  const f = d.financials;
  const price = d.price;
  let html = '';

  // Hero
  html += `
    <div class="ticker-hero">
      <span class="ticker-name">${d.ticker}</span>
      <span class="ticker-price">${fmt$(price)}</span>
      <span class="ticker-cap">${fmtB(d.market_cap)} market cap · ${fmtM(d.shares)}M shares</span>
    </div>
  `;

  // Warnings
  (d.warnings || []).forEach(w => {
    html += `<div class="warning-banner">⚠ ${w}</div>`;
  });

  // ── Scenarios ────────────────────────────────────────────────
  html += `<div class="section-header">Valuation Scenarios</div>`;
  html += `<div class="grid-3">`;
  for (const [key, label] of [['bear','BEAR ▼'],['base','BASE ●'],['bull','BULL ▲']]) {
    const sc = s[key];
    if (!sc) { html += `<div class="scenario-card scenario-${key}"><div class="scenario-label">${label}</div><div style="color:var(--muted);font-family:var(--mono);font-size:13px;">No data</div></div>`; continue; }
    const uClass = sc.upside >= 0 ? 'upside-pos' : 'upside-neg';
    const sign   = sc.upside >= 0 ? '+' : '';
    const tvWarn = sc.tv_pct > 0.75 ? `<div style="color:var(--amber);font-family:var(--mono);font-size:10px;margin-top:10px;">⚠ TV is ${pct(sc.tv_pct)} of EV</div>` : '';
    html += `
      <div class="scenario-card scenario-${key}">
        <div class="scenario-label">${label}</div>
        <div class="scenario-fv">${fmt$(sc.fair_value)}</div>
        <div class="scenario-upside ${uClass}">${sign}${pct(sc.upside)}</div>
        <div class="scenario-detail">
          <div class="detail-row"><span class="label">FCF Growth</span><span class="val">${pct(sc.fcf_growth)}</span></div>
          <div class="detail-row"><span class="label">WACC</span><span class="val">${pct(sc.wacc)}</span></div>
          <div class="detail-row"><span class="label">Terminal g</span><span class="val">${pct(sc.terminal_growth)}</span></div>
          <div class="detail-row"><span class="label">EV</span><span class="val">${fmtB(sc.ev)}</span></div>
          <div class="detail-row"><span class="label">TV%</span><span class="val">${pct(sc.tv_pct)}</span></div>
        </div>
        ${tvWarn}
      </div>`;
  }
  html += `</div>`;

  // ── Financials + FCF History ──────────────────────────────────
  html += `<div class="section-header">Financials</div>`;
  html += `<div class="grid-2">`;

  // Key metrics card
  html += `<div class="card"><div class="card-title">Key Metrics</div><div class="metrics-grid">`;
  const netDebtLabel = f.net_debt < 0 ? 'Net Cash' : 'Net Debt';
  const netDebtVal   = f.net_debt < 0 ? fmtM(Math.abs(f.net_debt)) : fmtM(f.net_debt);
  html += metric('Trailing FCF', fmtM(f.trailing_fcf));
  html += metric('Revenue TTM',  fmtM(f.revenue));
  html += metric('Cash', fmtM(f.cash));
  html += metric('Total Debt', fmtM(f.debt));
  html += metric(netDebtLabel, netDebtVal);
  html += metric('FCF Yield', pct(f.fcf_yield));
  html += metric('Leverage', f.leverage > 0 ? `${f.leverage.toFixed(1)}x` : 'Net Cash');
  html += `</div></div>`;

  // FCF history
  const hist = f.historical_fcf || [];
  const maxFcf = Math.max(...hist.map(Math.abs), 1);
  html += `<div class="card"><div class="card-title">FCF History (oldest → newest)</div><div class="fcf-bars">`;
  hist.forEach((v, i) => {
    const year = -(hist.length - 1 - i);
    const pct2  = Math.max(0, (v / maxFcf) * 100);
    const color = v < 0 ? 'var(--red)' : 'var(--accent)';
    html += `
      <div class="fcf-bar-row">
        <span class="fcf-bar-label">${year === 0 ? 'TTM' : `Y${year}`}</span>
        <div class="fcf-bar-track"><div class="fcf-bar-fill" style="width:${pct2}%;background:${color}"></div></div>
        <span class="fcf-bar-val">${fmtM(v)}</span>
      </div>`;
  });
  html += `</div></div></div>`;

  // ── ML Assessment ─────────────────────────────────────────────
  if (d.ml) {
    const ml = d.ml;
    const scoreClass = ml.priority_score >= 60 ? 'score-high' : ml.priority_score >= 30 ? 'score-mid' : 'score-low';
    const stableClass = ml.stability.is_stable ? 'badge-stable' : 'badge-unstable';
    const stableLabel = ml.stability.is_stable ? '✓ Stable' : '✗ Unstable';

    html += `<div class="section-header">ML Assessment</div>`;
    html += `<div class="grid-2">`;

    html += `<div class="card"><div class="card-title">Priority & Stability</div>
      <div class="ml-grid">
        <div class="ml-score-ring">
          <div class="score-circle ${scoreClass}">${Math.round(ml.priority_score)}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted);">PRIORITY /100</div>
        </div>
        <div style="display:flex;flex-direction:column;justify-content:center;gap:10px;">
          <div>
            <span class="stable-badge ${stableClass}">${stableLabel}</span>
            <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;">Stability: ${ml.stability.score.toFixed(0)}/100</div>
          </div>
          <div>
            <span class="cluster-pill">${ml.cluster.archetype}</span>
            <div style="font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.4;">${ml.cluster.description}</div>
          </div>
        </div>
      </div>
      ${(ml.stability.warnings||[]).map(w => `<div class="ml-warning">${w}</div>`).join('')}
    </div>`;

    // Implied growth
    let impliedHtml = `<div class="card"><div class="card-title">Market Implied</div>`;
    if (d.implied_growth !== null && d.implied_growth !== undefined) {
      const ig = d.implied_growth;
      impliedHtml += `
        <div class="implied-callout">
          The market is pricing in <strong>${pct(ig)}</strong> annual FCF growth
          at base WACC. This is the growth rate baked into the current share price.
          Ask yourself: is that realistic?
        </div>`;
    } else {
      impliedHtml += `<div style="color:var(--muted);font-family:var(--mono);font-size:12px;">Run with sensitivity enabled to see market-implied growth rate.</div>`;
    }
    impliedHtml += `</div>`;
    html += impliedHtml;
    html += `</div>`;
  }

  // ── Charts ────────────────────────────────────────────────────
  if (d.charts) {
    html += `<div class="section-header">Charts</div>`;
    html += `<div class="grid-2">`;
    if (d.charts.scenarios) html += `<div class="card" style="padding:12px"><img class="chart-img" src="data:image/png;base64,${d.charts.scenarios}"></div>`;
    if (d.charts.fcf)       html += `<div class="card" style="padding:12px"><img class="chart-img" src="data:image/png;base64,${d.charts.fcf}"></div>`;
    if (d.charts.ev)        html += `<div class="card" style="padding:12px"><img class="chart-img" src="data:image/png;base64,${d.charts.ev}"></div>`;
    html += `</div>`;

    if (d.charts.sensitivity) {
      html += `<div class="section-header">Sensitivity Heatmap</div>`;
      html += `<div class="card" style="padding:12px"><img class="chart-img" src="data:image/png;base64,${d.charts.sensitivity}"></div>`;
    }
  }

  // ── Sensitivity Table ─────────────────────────────────────────
  if (d.sensitivity) {
    const sens = d.sensitivity;
    html += `<div class="section-header">Sensitivity Table — Upside % vs Market Price</div>`;
    html += `<div class="card"><div class="sensitivity-wrap"><table class="sensitivity-table">`;
    html += `<tr><th>Growth \\ WACC</th>${sens.discount_rates.map(r=>`<th>${r}</th>`).join('')}</tr>`;
    sens.grid.forEach((row, i) => {
      html += `<tr><td>${sens.growth_rates[i]}</td>`;
      row.forEach(v => {
        const cls = cellClass(v);
        const label = v === null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(0) + '%';
        html += `<td class="${cls}">${label}</td>`;
      });
      html += `</tr>`;
    });
    html += `</table></div></div>`;
  }

  // ── Projections Table ─────────────────────────────────────────
  if (d.projections && d.projections.length) {
    html += `<div class="section-header">FCF Projections ($M)</div>`;
    html += `<div class="card"><table>`;
    html += `<tr><th>Year</th><th>Bear</th><th>Base</th><th>Bull</th></tr>`;
    d.projections.forEach(row => {
      html += `<tr><td>Year ${row.year}</td>
        <td style="color:var(--red)">${row.bear !== null ? fmtM(row.bear) : '—'}</td>
        <td style="color:var(--sub)">${fmtM(row.base)}</td>
        <td style="color:var(--green)">${row.bull !== null ? fmtM(row.bull) : '—'}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  return html;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCREENER
// ─────────────────────────────────────────────────────────────────────────────
async function runScreener() {
  const raw = document.getElementById('tickers-textarea').value;
  const tickers = raw.split(/[\n,\s]+/).map(t => t.trim().toUpperCase()).filter(Boolean);

  if (!tickers.length) return;

  const status = document.getElementById('screen-status');
  const resultsEl = document.getElementById('screen-results');

  status.classList.add('visible');
  document.getElementById('screen-status-text').textContent =
    `Running DCF on ${tickers.length} tickers... this may take a minute.`;
  resultsEl.innerHTML = '';

  try {
    const res = await fetch('/api/screen', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ tickers }),
    });
    const data = await res.json();
    if (!res.ok) {
      resultsEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
    } else {
      resultsEl.innerHTML = buildScreenerHTML(data);
    }
  } catch (e) {
    resultsEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  } finally {
    status.classList.remove('visible');
  }
}

async function loadSavedCandidates() {
  const resultsEl = document.getElementById('screen-results');
  const status = document.getElementById('screen-status');
  status.classList.add('visible');
  document.getElementById('screen-status-text').textContent = 'Loading from Supabase...';

  try {
    const res = await fetch('/api/candidates');
    const data = await res.json();
    const candidates = data.candidates || [];
    if (!candidates.length) {
      resultsEl.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No saved candidates yet. Run the screener first.</div>`;
    } else {
      resultsEl.innerHTML = buildCandidateList(candidates, 'Saved Candidates (Last 7 Days)');
    }
  } catch (e) {
    resultsEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  } finally {
    status.classList.remove('visible');
  }
}

function buildScreenerHTML(data) {
  let html = `
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:16px;">
      Screened ${data.total_screened} tickers · ${data.candidates.length} candidates found
      ${data.errors.length ? ` · ${data.errors.length} failed` : ''}
    </div>`;

  if (data.errors.length) {
    const errTickers = data.errors.map(e => e.ticker).join(', ');
    html += `<div class="warning-banner">Failed to fetch: ${errTickers}</div>`;
  }

  if (data.screener_chart) {
    html += `<div class="card" style="padding:12px;margin-bottom:20px"><img class="chart-img" src="data:image/png;base64,${data.screener_chart}"></div>`;
  }

  html += buildCandidateList(data.candidates, 'Research Candidates');
  return html;
}

function buildCandidateList(candidates, title) {
  if (!candidates.length) {
    return `<div class="empty-state"><div class="icon">🔍</div>No candidates met screening criteria.</div>`;
  }

  let html = `<div class="section-header">${title}</div>`;
  candidates.forEach((c, i) => {
    const baseClass = c.base_upside >= 0 ? 'upside-pos' : 'upside-neg';
    const bearClass = c.bear_upside >= 0 ? 'upside-pos' : 'upside-neg';
    const bullClass = c.bull_upside >= 0 ? 'upside-pos' : 'upside-neg';

    html += `
      <div class="candidate-card">
        <div class="candidate-rank">${i + 1}</div>
        <div>
          <div class="candidate-ticker">${c.ticker}
            <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:8px;">score: ${c.score}</span>
          </div>
          <div class="candidate-reason">${c.reason}</div>
        </div>
        <div class="candidate-upsides">
          <div class="upside-row"><span class="upside-tag">BEAR</span><span class="${bearClass}">${sign(c.bear_upside)}</span></div>
          <div class="upside-row"><span class="upside-tag">BASE</span><span class="${baseClass}">${sign(c.base_upside)}</span></div>
          <div class="upside-row"><span class="upside-tag">BULL</span><span class="${bullClass}">${sign(c.bull_upside)}</span></div>
        </div>
      </div>`;
  });

  html += `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:12px;">
    Filters: ≥25% base upside · FCF positive · Leverage ≤8x · FCF yield ≥2% · Results are research candidates, not buy signals.
  </div>`;
  return html;
}

// ─────────────────────────────────────────────────────────────────────────────
// FORMATTING HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function fmt$(n)  { return n != null ? '$' + n.toFixed(2) : '—'; }
function pct(n)   { return n != null ? (n * 100).toFixed(1) + '%' : '—'; }
function sign(n)  { return n != null ? (n >= 0 ? '+' : '') + (n * 100).toFixed(0) + '%' : '—'; }

function fmtM(n) {
  if (n == null) return '—';
  if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(2) + 'B';
  return '$' + n.toFixed(0) + 'M';
}

function fmtB(n) {
  if (n == null) return '—';
  return '$' + (n / 1000).toFixed(2) + 'B';
}

function metric(label, val) {
  return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${val}</div></div>`;
}

function cellClass(v) {
  if (v === null) return 'cell-neutral';
  if (v >= 40)  return 'cell-pos-high';
  if (v >= 15)  return 'cell-pos-mid';
  if (v >= 0)   return 'cell-pos-low';
  if (v >= -15) return 'cell-neg-low';
  if (v >= -40) return 'cell-neg-mid';
  return 'cell-neg-high';
}
